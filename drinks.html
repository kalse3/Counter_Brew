<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse — Counter Brew</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="assets/img/logo.png" alt="Counter Brew" height="60">
      </a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="drinks.html">Browse</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="explore.html">Explore</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h1>Browse Drinks</h1>
    <p class="lead mb-4">Curated café-style drinks you can make at home — no espresso machine needed.</p>

    <div id="filters" class="filter-bar d-flex flex-wrap gap-3 align-items-end mb-4 p-3 rounded">

      <div class="filter-group">
        <label for="filter-temp" class="form-label mb-1">Temperature</label>
        <select id="filter-temp" class="form-select form-select-sm">
          <option value="all">All</option>
          <option value="hot">Hot</option>
          <option value="iced">Iced</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-brewMethod" class="form-label mb-1">Brew method</label>
        <select id="filter-brewMethod" class="form-select form-select-sm">
          <option value="all">All</option>
          <option value="moka pot">Moka pot</option>
          <option value="french press">French press</option>
          <option value="pour-over">Pour-over / drip</option>
          <option value="cold steep">Cold steep</option>
          <option value="boiled">Boiled</option>
          <option value="instant/whisked">Instant / whisked</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-milk" class="form-label mb-1">Milk</label>
        <select id="filter-milk" class="form-select form-select-sm">
          <option value="all">All</option>
          <option value="none">No milk</option>
          <option value="some">With milk</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-sweetness" class="form-label mb-1">Sweetness</label>
        <select id="filter-sweetness" class="form-select form-select-sm">
          <option value="all">All</option>
          <option value="none">None</option>
          <option value="low">Low</option>
          <option value="sweet">Sweet</option>
        </select>
      </div>

      <button id="filter-reset" class="btn btn-sm btn-outline-secondary align-self-end">
        Reset filters
      </button>

    </div>

    <p id="result-count" class="result-count mb-3"></p>

    <div id="drink-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      <!-- DrinkList renders cards here -->
    </div>
  </main>

  <footer class="site-footer">
    <div class="container d-flex flex-wrap justify-content-between align-items-center py-3">
      <div class="d-flex gap-3">
        <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i> Instagram</a>
        <a href="#" aria-label="Twitter / X"><i class="bi bi-twitter-x"></i> Twitter / X</a>
        <a href="#" aria-label="Facebook"><i class="bi bi-facebook"></i> Facebook</a>
      </div>
      <address class="mb-0">
        <a href="mailto:contact@counterbrew.com">contact@counterbrew.com</a>
      </address>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
